name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/bx-linux-amd64       .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/bx-linux-arm64       .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/bx-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/bx-darwin-arm64      .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/bx-windows-amd64.exe .

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
